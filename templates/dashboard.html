<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Bot - Dashboard</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --primary: #ff0050;
            --secondary: #00f2ea;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4caf50;
            --warning: #ff9800;
            --danger: #f44336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .navbar {
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(255, 0, 80, 0.3);
        }

        .navbar-brand {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-user span {
            color: white;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #2a2a2a;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .card h2 {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 5px;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-start { background: var(--success); }
        .btn-stop { background: var(--danger); }
        .btn-generate { background: var(--primary); }
        .btn-batch { background: #9c27b0; }
        .btn-save { background: var(--secondary); color: black; }
        .btn-clear { background: var(--warning); color: black; }

        .input-group { margin: 15px 0; }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: white;
            font-size: 1em;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .queue-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .queue-item {
            background: #2a2a2a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            position: relative;
        }

        .queue-item.posted {
            border-left-color: var(--success);
        }

        .queue-item .title {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .queue-item .meta {
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .queue-item .btn-delete {
            position: absolute;
            right: 10px;
            top: 10px;
            background: var(--danger);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .status-running {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            animation: pulse 2s infinite;
        }

        .status-stopped {
            background: rgba(244, 67, 54, 0.2);
            color: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #2a2a2a;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab:hover { background: #2a2a2a; }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideDown 0.3s ease;
            display: none;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        .notification.info { background: var(--secondary); color: black; }

        .log-container {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #1a1a1a;
            color: var(--text-secondary);
        }

        .log-entry.success { color: var(--success); }
        .log-entry.error { color: var(--danger); }
        .log-entry.info { color: var(--secondary); }
        .log-entry.warning { color: var(--warning); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-content .close {
            float: right;
            cursor: pointer;
            font-size: 1.5em;
            color: var(--text-secondary);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }

        .welcome-message {
            text-align: center;
            padding: 20px;
            background: rgba(0, 242, 234, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">🤖 TikTok Bot</a>
        <div class="navbar-user">
            <span>👤 <strong id="usernameDisplay">Carregando...</strong></span>
            <button class="btn-logout" onclick="logout()">🚪 Sair</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-message">
            <h2>Bem-vindo ao TikTok Bot! 🎉</h2>
            <p style="color: var(--text-secondary);">Gerencie seus vídeos automaticamente</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="videosToday">0</div>
                <div class="stat-label">Vídeos Hoje</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="videosQueued">0</div>
                <div class="stat-label">Na Fila</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="videosPosted">0</div>
                <div class="stat-label">Postados</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalVideos">0</div>
                <div class="stat-label">Total de Vídeos</div>
            </div>
        </div>

        <div class="main-grid">
            <div>
                <div class="card">
                    <h2>🎮 Controles</h2>
                    <button class="btn btn-start" onclick="startSystem()">▶ Iniciar Sistema</button>
                    <button class="btn btn-stop" onclick="stopSystem()">⏹ Parar Sistema</button>
                    <button class="btn btn-generate" id="btnGenerate" onclick="generateNow()">🎬 Gerar 1 Vídeo</button>
                    <button class="btn btn-batch" onclick="generateBatch()">📦 Gerar em Lote</button>
                    <button class="btn btn-clear" onclick="clearQueue()">🗑 Limpar Fila</button>
                </div>

                <div class="card">
                    <h2>⚙️ Configurações</h2>
                    <div class="input-group">
                        <label>Posts por Dia:</label>
                        <input type="number" id="postsPerDay" value="3" min="1" max="24">
                    </div>
                    <div class="input-group">
                        <label>Tema Preferido:</label>
                        <select id="preferredTopic">
                            <option value="auto">Automático (Aleatório)</option>
                            <option value="motivação">Motivação</option>
                            <option value="tecnologia">Tecnologia</option>
                            <option value="dicas">Dicas</option>
                            <option value="humor">Humor</option>
                            <option value="curiosidades">Curiosidades</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Duração do Vídeo (segundos):</label>
                        <input type="number" id="videoDuration" value="60" min="15" max="180">
                    </div>
                    <button class="btn btn-save" onclick="saveSettings()">💾 Salvar Configurações</button>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('queue')">📋 Fila</div>
                        <div class="tab" onclick="switchTab('posted')">✅ Postados</div>
                        <div class="tab" onclick="switchTab('logs')">📊 Logs</div>
                    </div>

                    <div id="queueTab">
                        <div class="queue-list" id="queueList">
                            <p style="color: var(--text-secondary); text-align: center; padding: 20px;">
                                Nenhum vídeo na fila
                            </p>
                        </div>
                    </div>

                    <div id="postedTab" style="display: none;">
                        <div class="queue-list" id="postedList">
                            <p style="color: var(--text-secondary); text-align: center; padding: 20px;">
                                Nenhum vídeo postado
                            </p>
                        </div>
                    </div>

                    <div id="logsTab" style="display: none;">
                        <div class="log-container" id="logContainer">
                            <div class="log-entry info">Sistema carregado...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <div class="modal" id="batchModal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>📦 Gerar Vídeos em Lote</h3>
            <div class="input-group">
                <label>Quantos vídeos deseja gerar?</label>
                <input type="number" id="batchCount" value="5" min="1" max="50">
            </div>
            <button class="btn btn-batch" onclick="confirmBatch()">🚀 Gerar Agora</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let updateInterval;

        // Carregar dados do usuário
        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_URL}/api/user/info`);
                const data = await response.json();
                document.getElementById('usernameDisplay').textContent = data.username;
                document.getElementById('postsPerDay').value = data.config.posts_per_day;
                document.getElementById('preferredTopic').value = data.config.preferred_topic;
                document.getElementById('videoDuration').value = data.config.video_duration;
            } catch (error) {
                console.error('Erro ao carregar usuário:', error);
            }
        }

        // Atualizar estatísticas
        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const data = await response.json();
                
                document.getElementById('videosToday').textContent = data.videos_today;
                document.getElementById('videosQueued').textContent = data.videos_queued;
                document.getElementById('videosPosted').textContent = data.videos_posted;
                document.getElementById('totalVideos').textContent = data.total_videos;
            } catch (error) {
                console.error('Erro ao atualizar stats:', error);
            }
        }

        // Atualizar listas
        async function updateLists() {
            try {
                // Fila
                const queueResponse = await fetch(`${API_URL}/api/videos?status=queued`);
                const queueData = await queueResponse.json();
                updateQueueList(queueData);

                // Postados
                const postedResponse = await fetch(`${API_URL}/api/videos?status=posted`);
                const postedData = await postedResponse.json();
                updatePostedList(postedData);

                // Logs
                const logsResponse = await fetch(`${API_URL}/api/logs`);
                const logsData = await logsResponse.json();
                updateLogs(logsData);
            } catch (error) {
                console.error('Erro ao atualizar listas:', error);
            }
        }

        function updateQueueList(videos) {
            const list = document.getElementById('queueList');
            if (!videos || videos.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Nenhum vídeo na fila</p>';
                return;
            }
            
            list.innerHTML = videos.map(video => `
                <div class="queue-item">
                    <button class="btn-delete" onclick="deleteVideo(${video.id})">🗑</button>
                    <div class="title">${video.title || 'Sem título'}</div>
                    <div class="meta">
                        🏷️ ${video.category || 'N/A'} | 
                        ⏱️ ${new Date(video.created_at).toLocaleString('pt-BR')}
                    </div>
                </div>
            `).join('');
        }

        function updatePostedList(videos) {
            const list = document.getElementById('postedList');
            if (!videos || videos.length === 0) {
                list.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Nenhum vídeo postado</p>';
                return;
            }
            
            list.innerHTML = videos.map(video => `
                <div class="queue-item posted">
                    <button class="btn-delete" onclick="deleteVideo(${video.id})">🗑</button>
                    <div class="title">✅ ${video.title || 'Sem título'}</div>
                    <div class="meta">
                        🏷️ ${video.category || 'N/A'} | 
                        📅 ${new Date(video.processed_at || video.created_at).toLocaleString('pt-BR')}
                    </div>
                </div>
            `).join('');
        }

        function updateLogs(logs) {
            const container = document.getElementById('logContainer');
            container.innerHTML = logs.map(log => `
                <div class="log-entry ${log.type}">
                    [${new Date(log.created_at).toLocaleTimeString('pt-BR')}] ${log.message}
                </div>
            `).join('');
        }

        // Ações
        async function startSystem() {
            try {
                const response = await fetch(`${API_URL}/api/system/start`);
                const data = await response.json();
                showNotification('✅ Sistema iniciado!', 'success');
            } catch (error) {
                showNotification('❌ Erro ao iniciar', 'error');
            }
        }

        async function stopSystem() {
            try {
                const response = await fetch(`${API_URL}/api/system/stop`);
                const data = await response.json();
                showNotification('⏹ Sistema parado', 'info');
            } catch (error) {
                showNotification('❌ Erro ao parar', 'error');
            }
        }

        async function generateNow() {
            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.textContent = '⏳ Gerando...';
            
            try {
                const response = await fetch(`${API_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: document.getElementById('preferredTopic').value,
                        duration: parseInt(document.getElementById('videoDuration').value)
                    })
                });
                
                const data = await response.json();
                if (data.status === 'ok') {
                    showNotification('✅ Vídeo gerado com sucesso!', 'success');
                    updateAll();
                }
            } catch (error) {
                showNotification('❌ Erro ao gerar', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🎬 Gerar 1 Vídeo';
            }
        }

        function generateBatch() {
            document.getElementById('batchModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('batchModal').classList.remove('active');
        }

        async function confirmBatch() {
            const count = parseInt(document.getElementById('batchCount').value);
            closeModal();
            
            try {
                const response = await fetch(`${API_URL}/api/generate-batch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: count })
                });
                
                const data = await response.json();
                if (data.status === 'ok') {
                    showNotification(`✅ ${data.count} vídeos gerados!`, 'success');
                    updateAll();
                }
            } catch (error) {
                showNotification('❌ Erro ao gerar lote', 'error');
            }
        }

        async function saveSettings() {
            try {
                const response = await fetch(`${API_URL}/api/settings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        posts_per_day: parseInt(document.getElementById('postsPerDay').value),
                        preferred_topic: document.getElementById('preferredTopic').value,
                        video_duration: parseInt(document.getElementById('videoDuration').value)
                    })
                });
                
                showNotification('⚙️ Configurações salvas!', 'success');
            } catch (error) {
                showNotification('❌ Erro ao salvar', 'error');
            }
        }

        async function deleteVideo(videoId) {
            if (!confirm('Tem certeza que deseja deletar este vídeo?')) return;
            
            try {
                await fetch(`${API_URL}/api/video/${videoId}/delete`, { method: 'DELETE' });
                showNotification('🗑 Vídeo deletado!', 'info');
                updateAll();
            } catch (error) {
                showNotification('❌ Erro ao deletar', 'error');
            }
        }

        async function clearQueue() {
            if (!confirm('Limpar toda a fila de vídeos?')) return;
            
            try {
                await fetch(`${API_URL}/api/queue/clear`, { method: 'POST' });
                showNotification('🗑 Fila limpa!', 'info');
                updateAll();
            } catch (error) {
                showNotification('❌ Erro ao limpar', 'error');
            }
        }

        function logout() {
            window.location.href = '/logout';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('queueTab').style.display = 'none';
            document.getElementById('postedTab').style.display = 'none';
            document.getElementById('logsTab').style.display = 'none';
            
            if (tab === 'queue') document.getElementById('queueTab').style.display = 'block';
            if (tab === 'posted') document.getElementById('postedTab').style.display = 'block';
            if (tab === 'logs') document.getElementById('logsTab').style.display = 'block';
        }

        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function updateAll() {
            updateStats();
            updateLists();
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            updateAll();
            updateInterval = setInterval(updateAll, 10000); // Atualizar a cada 10 segundos
        });

        // Atalhos de teclado
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'g') {
                    e.preventDefault();
                    generateNow();
                }
                if (e.key === 'b') {
                    e.preventDefault();
                    generateBatch();
                }
            }
        });
    </script>
</body>
</html>
